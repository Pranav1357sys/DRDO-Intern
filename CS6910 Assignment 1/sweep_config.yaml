program: train.py
method: random
run_cap: 30

metric:
  name: val_accuracy
  goal: maximize

parameters:

  epochs:
    values: [5]

  learning_rate:
    values: [0.01, 0.001, 0.0005]

  batch_size:
    values: [32, 64]

  hidden_size:
    values: [64, 128]

  optimizer:
    values: ["sgd", "momentum", "rmsprop", "adam"]

  activation:
    values: ["ReLU", "tanh"]